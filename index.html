// ─── BUTTONS (prominent, glowing, beautiful) ──────────────────────────────────
function Btn({ children, onClick, variant="secondary", size="md", disabled=false, style:ex={} }) {
  const [hov, setHov] = useState(false);
  const V = {
    primary: {
      bg: hov ? "linear-gradient(135deg,#f0b429,#d4960f)" : "linear-gradient(135deg,#d4960f,#b07a08)",
      color:"#0a0800", border:"#f0b429",
      shadow: hov ? "0 6px 28px #f0b42970, 0 0 0 1px #f0b429, inset 0 1px 0 #ffffff40"
                  : "0 4px 20px #f0b42950, 0 0 0 1px #c49010, inset 0 1px 0 #ffffff30",
      transform: hov ? "translateY(-2px)" : "translateY(0)",
    },
    danger: {
      bg: hov ? "linear-gradient(135deg,#dc2626,#b91c1c)" : "linear-gradient(135deg,#991b1b,#7f1d1d)",
      color:"#fecaca", border:"#dc2626",
      shadow: hov ? "0 4px 20px #dc262650, 0 0 0 1px #dc2626" : "0 2px 10px #dc262630, 0 0 0 1px #7f1d1d",
      transform: hov ? "translateY(-1px)" : "translateY(0)",
    },
    success: {
      bg: hov ? "linear-gradient(135deg,#16a34a,#15803d)" : "linear-gradient(135deg,#15803d,#166534)",
      color:"#dcfce7", border:"#22c55e",
      shadow: hov ? "0 4px 20px #22c55e50, 0 0 0 1px #22c55e" : "0 2px 10px #22c55e30, 0 0 0 1px #15803d",
      transform: hov ? "translateY(-1px)" : "translateY(0)",
    },
    secondary: {
      bg: hov ? C.bg3 : C.bg2,
      color: C.textSub, border: C.borderHi,
      shadow: hov ? `0 4px 14px rgba(0,0,0,.4), 0 0 0 1px ${C.borderHi}` : `0 2px 6px rgba(0,0,0,.3), 0 0 0 1px ${C.border}`,
      transform: hov ? "translateY(-1px)" : "translateY(0)",
    },
    ghost: {
      bg:"transparent", color:C.textSub, border:C.border,
      shadow:"none", transform:"translateY(0)",
    },
  };
  const v = V[variant]||V.secondary;
  const pad = size==="sm"?"6px 14px":size==="lg"?"14px 32px":"10px 20px";
  const fs  = size==="sm"?11:size==="lg"?15:13;
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background:v.bg, color:v.color, border:`1px solid ${v.border}`, borderRadius:9,
        padding:pad, fontSize:fs, fontWeight:800, cursor:disabled?"not-allowed":"pointer",
        display:"inline-flex", alignItems:"center", gap:6, whiteSpace:"nowrap",
        boxShadow:v.shadow, opacity:disabled?.4:1, letterSpacing:.3,
        fontFamily:"inherit", transition:"all .15s cubic-bezier(.22,1,.36,1)",
        transform:disabled?"none":v.transform, ...ex }}>
      {children}
    </button>
  );
}

// ─── QUOTE STRIP ──────────────────────────────────────────────────────────────
function QuoteStrip({ traitKey }) {
  const pool = traitKey ? QUOTES.filter(q=>q.trait===traitKey||q.trait===null) : QUOTES;
  const q = pool[Math.floor(Math.random() * pool.length)];
  const t = traitKey ? TRAITS[traitKey] : null;
  const color = t?.color || C.gold;
  const bg    = t?.bg    || C.goldBg;
  const border= t?.border|| C.goldBorder;
  return (
    <div style={{ background:`linear-gradient(135deg,${bg},${C.bg0})`,
        border:`1px solid ${border}`, borderLeft:`3px solid ${color}`,
        borderRadius:10, padding:"12px 16px",
        display:"flex", gap:10, alignItems:"flex-start" }}>
      <span style={{ color, fontSize:20, lineHeight:1, flexShrink:0, marginTop:1 }}>"</span>
      <div>
        <div style={{ fontSize:13, color, fontStyle:"italic", lineHeight:1.6, fontWeight:500 }}>
          {q.text}
        </div>
        <div style={{ fontSize:12, color:C.textMuted, marginTop:5, fontWeight:700,
            letterSpacing:.8, textTransform:"uppercase" }}>
          — Danny Cancino, The Irreducible Complexity for Success
        </div>
      </div>
    </div>
  );
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children, width=540 }) {
  return (
    <div className="fade-in"
      style={{ position:"fixed", inset:0, background:"rgba(4,8,16,.92)", zIndex:500,
        display:"flex", alignItems:"center", justifyContent:"center", padding:16,
        backdropFilter:"blur(8px)" }}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="fade-up"
        style={{ background:`linear-gradient(160deg,${C.bg2} 0%,${C.bg1} 100%)`,
          border:`1px solid ${C.borderHi}`, borderRadius:16,
          width:"100%", maxWidth:width, maxHeight:"92vh",
          display:"flex", flexDirection:"column",
          boxShadow:`0 40px 100px rgba(0,0,0,.95), 0 0 0 1px ${C.borderHi}, inset 0 1px 0 rgba(255,255,255,.04)` }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"16px 22px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
          <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:19,
              fontWeight:800, letterSpacing:1, color:C.text }}>{title}</span>
          <Btn onClick={onClose} variant="ghost" size="sm">✕</Btn>
        </div>

// ─── SCORE SYSTEM ─────────────────────────────────────────────────────────────
const SCORE_LABELS = ["Missing","Emerging","Developing","Strong"];
const SCORE_ICONS  = ["❌","🌱","📈","✅"];
const SCORE_COLORS = ["#ef4444","#f59e0b","#3b82f6","#22c55e"];
const SCORE_BGS    = ["#1a0202","#1a0e00","#020a1a","#011008"];

function ScorePip({ score, size=10 }) {
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}>
      {[0,1,2,3].map(i => (
        <span key={i} style={{ width:size, height:size, borderRadius:"50%",
            background: i<=score ? SCORE_COLORS[score] : C.bg3,
            border:`1px solid ${i<=score ? SCORE_COLORS[score] : C.border}`,
            display:"inline-block", flexShrink:0,
            boxShadow: i<=score ? `0 0 6px ${SCORE_COLORS[score]}80` : "none",
            transition:"all .2s" }}/>
      ))}
    </span>
  );
}

function ScoreBadge({ score, small }) {
  const c = SCORE_COLORS[score]||SCORE_COLORS[0];
  return (
    <span style={{ background:SCORE_BGS[score]||SCORE_BGS[0], color:c,
        border:`1px solid ${c}55`, borderRadius:6,
        padding:small?"2px 8px":"4px 11px",
        fontSize:small?9:11, fontWeight:800, letterSpacing:.5,
        boxShadow:`0 0 8px ${c}20` }}>
      {SCORE_LABELS[score]||"Unknown"}
    </span>
  );
}

  const t = TRAITS[traitKey];
  return (
    <div style={{ display:"flex", gap:6 }}>
      {SCORE_LABELS.map((lbl,i) => {

              color: sel ? c : C.textMuted,
              border:`2px solid ${sel ? c : C.border}`,
              boxShadow: sel ? `0 0 14px ${c}40, inset 0 1px 0 ${c}20` : "none",
              transition:"all .15s cubic-bezier(.22,1,.36,1)",
              transform: sel ? "translateY(-1px)" : "translateY(0)" }}>
            <span style={{fontSize:14,display:"block",marginBottom:2}}>{SCORE_ICONS[i]}</span>{lbl}
          </button>

// ─── COMBO LOGIC ──────────────────────────────────────────────────────────────
function getCombo(scores) {
  const has = Object.entries(scores).filter(([,v])=>v>=2).map(([k])=>k);
  if (has.includes("D")&&has.includes("A")&&has.includes("H")) return COMBOS[0];
  if (has.includes("D")&&has.includes("H")&&!has.includes("A")) return COMBOS[1];
  if (has.includes("D")&&has.includes("A")&&!has.includes("H")) return COMBOS[2];
  if (has.includes("A")&&has.includes("H")&&!has.includes("D")) return COMBOS[3];
  if (has.includes("D")&&!has.includes("A")&&!has.includes("H")) return COMBOS[4];
  if (has.includes("H")&&!has.includes("A")&&!has.includes("D")) return COMBOS[5];
  if (has.includes("A")&&!has.includes("D")&&!has.includes("H")) return COMBOS[6];
  return null;
}

// ─── ADD / EDIT PERSON MODAL ──────────────────────────────────────────────────
function PersonModal({ person, onSave, onClose }) {
  const [name,    setName]    = useState(person.name||"");
  const [role,    setRole]    = useState(person.role||"");
  const [notes,   setNotes]   = useState(person.notes||"");
  const [scores,  setScores]  = useState({...person.scores});
  const [context, setContext] = useState(person.context||"work");
  const combo = getCombo(scores);

  function submit() {
    if (!name.trim()) return;
    onSave({...person, name:name.trim(), role:role.trim(), notes:notes.trim(), scores, context});
  }

  return (
    <Modal title={person.id ? `Edit: ${person.name}` : "Add Person"} onClose={onClose} width={520}>
      <div style={{ display:"flex", flexDirection:"column", gap:18 }}>

        <div style={{ display:"flex", gap:12 }}>
          <div style={{ flex:2 }}>
            <label style={S.lbl}>Full Name *</label>
            <input style={S.input} value={name} onChange={e=>setName(e.target.value)}
              placeholder="e.g. Danny Cancino" autoFocus
              onFocus={e=>e.target.style.borderColor=C.borderBright}
              onBlur={e=>e.target.style.borderColor=C.border}
              onKeyDown={e=>e.key==="Enter"&&submit()}/>
          </div>
          <div style={{ flex:1 }}>
            <label style={S.lbl}>Context</label>
            <select style={S.input} value={context} onChange={e=>setContext(e.target.value)}>
              <option value="work">🔥 Work</option>
              <option value="life">🏡 Personal</option>
            </select>
          </div>
        </div>

        <div>
          <label style={S.lbl}>Role / Relationship</label>
          <input style={S.input} value={role} onChange={e=>setRole(e.target.value)}
            placeholder="e.g. Lieutenant, Coworker, Spouse, Coach"
            onFocus={e=>e.target.style.borderColor=C.borderBright}
            onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>

        {/* Score each trait */}
        {Object.values(TRAITS).map(t => (
          <div key={t.key} style={{ background:`linear-gradient(135deg,${t.bg},${C.bg0})`,
              border:`1px solid ${t.border}`, borderRadius:12, padding:"14px 16px",
              boxShadow:`inset 0 1px 0 ${t.borderHi}20` }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:11 }}>
              <span style={{ fontSize:26, lineHeight:1 }}>{t.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900,
                    fontSize:16, color:t.color, letterSpacing:.5 }}>{t.label}</div>
                <div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic" }}>"{t.tagline}"</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <ScorePip score={scores[t.key]} size={9}/>
                <ScoreBadge score={scores[t.key]} small/>
              </div>
            </div>

            {/* Quick reference */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:11 }}>
              <div style={{ background:"rgba(0,0,0,.3)", borderRadius:7, padding:"8px 10px" }}>
                <div style={{ fontSize:11, fontWeight:700, color:t.color, textTransform:"uppercase",
                    letterSpacing:1, marginBottom:5 }}>Has It</div>
                {t.hasIt.slice(0,2).map((s,i)=>(
                  <div key={i} style={{ fontSize:13, color:C.textMuted, lineHeight:1.4, marginBottom:3,
                      display:"flex", gap:5 }}>
                    <span style={{ color:t.color }}>→</span>{s}
                  </div>
                ))}
              </div>
              <div style={{ background:"rgba(0,0,0,.3)", borderRadius:7, padding:"8px 10px" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#ef4444", textTransform:"uppercase",
                    letterSpacing:1, marginBottom:5 }}>Missing It</div>
                {t.lacksIt.slice(0,2).map((s,i)=>(
                  <div key={i} style={{ fontSize:13, color:C.textMuted, lineHeight:1.4, marginBottom:3,
                      display:"flex", gap:5 }}>
                    <span style={{ color:"#ef4444" }}>–</span>{s}
                  </div>
                ))}
              </div>
            </div>

            <TraitScoreSelector traitKey={t.key} value={scores[t.key]}
              onChange={v=>setScores(p=>({...p,[t.key]:v}))}/>
          </div>
        ))}

        {/* Live combo preview */}
        {combo && (
          <div className="fade-up"
            style={{ background:`linear-gradient(135deg,${combo.bg},${C.bg0})`,
              border:`1px solid ${combo.borderHi}`, borderRadius:11,
              padding:"12px 16px", display:"flex", alignItems:"center", gap:11,
              boxShadow:`0 4px 20px ${combo.color}20` }}>
            <span style={{ fontSize:24 }}>{combo.icon}</span>
            <div>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900,
                  fontSize:16, color:combo.color, letterSpacing:.5 }}>{combo.label}</div>
              <div style={{ fontSize:11, color:C.textMuted, marginTop:2 }}>{combo.character}</div>
            </div>
          </div>
        )}

        <div>
          <label style={S.lbl}>Notes</label>
          <textarea style={{ ...S.input, resize:"vertical", minHeight:72, lineHeight:1.55 }}
            value={notes} onChange={e=>setNotes(e.target.value)}
            onFocus={e=>e.target.style.borderColor=C.borderBright}
            onBlur={e=>e.target.style.borderColor=C.border}
            placeholder="What have you observed? Key moments, growth areas, what's worked..."/>
        </div>

        <div style={{ display:"flex", gap:10, justifyContent:"flex-end", paddingTop:4 }}>
          <Btn onClick={onClose} variant="ghost"><span style={{fontSize:14,lineHeight:1}}>✕</span><span style={{marginLeft:3}}>Cancel</span></Btn>
          <Btn onClick={submit} variant="primary" size="lg" disabled={!name.trim()}><span style={{fontSize:20,lineHeight:1}}>{person.id?"💾":"＋"}</span><span style={{marginLeft:4}}>{person.id ? "Save Changes" : "Add Person"}</span></Btn>
        </div>
      </div>
    </Modal>
  );
}

// ─── PEOPLE TAB ───────────────────────────────────────────────────────────────
function PeopleTab({ people, setPeople }) {
  const [q,          setQ]          = useState("");
  const [contextF,   setContextF]   = useState("all");
  const [editing,    setEditing]    = useState(null);
  const [viewing,    setViewing]    = useState(null);
  const [delPending, setDelPending] = useState(null);

  const filtered = useMemo(()=>people.filter(p=>{
    if (q&&!p.name.toLowerCase().includes(q.toLowerCase())&&
        !(p.role||"").toLowerCase().includes(q.toLowerCase())) return false;
    if (contextF!=="all"&&p.context!==contextF) return false;
    return true;
  }),[people,q,contextF]);

  function savePerson(p) {
    const next = p.id&&people.find(x=>x.id===p.id)
      ? people.map(x=>x.id===p.id?p:x)
      : [...people,{...p,id:uid()}];
    setPeople(next); setEditing(null);
  }

  function deletePerson(id) { setPeople(people.filter(p=>p.id!==id)); setDelPending(null); }

  const blank = { id:"", name:"", role:"", notes:"", context:"work", scores:{D:0,A:0,H:0} };

  const stats = useMemo(()=>{
    const all3 = people.filter(p=>getCombo(p.scores)?.id==="DAH").length;
    const weak = people.filter(p=>Object.values(p.scores).some(v=>v<=1)).length;
    return { total:people.length, all3, weak, work:people.filter(p=>p.context==="work").length, life:people.filter(p=>p.context==="life").length };
  },[people]);

  return (
    <div style={{ padding:18 }}>

      {/* Stats hero */}
      {people.length>0 && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))", gap:10, marginBottom:18 }}>
          {[
            { label:"Total", val:stats.total, color:C.gold, sub:"people" },
            { label:"All Three", val:stats.all3, color:SCORE_COLORS[3], sub:"full equation" },
            { label:"Developing", val:stats.weak, color:SCORE_COLORS[1], sub:"need focus" },
            { label:"Work", val:stats.work, color:"#f97316", sub:"colleagues" },
            { label:"Personal", val:stats.life, color:"#a855f7", sub:"relationships" },
          ].map((s,i)=>(
            <div key={i} style={{ background:`linear-gradient(135deg,${C.bg1},${C.bg0})`,
                border:`1px solid ${C.border}`, borderRadius:12, padding:"13px 15px",
                boxShadow:"0 2px 10px rgba(0,0,0,.3)" }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900,
                  fontSize:32, color:s.color, lineHeight:1 }}>{s.val}</div>
              <div style={{ fontSize:11, fontWeight:700, color:C.text, marginTop:4 }}>{s.label}</div>
              <div style={{ fontSize:12, color:C.textMuted, marginTop:2 }}>{s.sub}</div>
            </div>
          ))}
        </div>
      )}

      {/* Controls */}
      <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap", marginBottom:16 }}>
        <input style={{ ...S.input, width:210,
            boxShadow:"inset 0 2px 6px rgba(0,0,0,.3)" }}
          placeholder="Search name or role..."
          value={q} onChange={e=>setQ(e.target.value)}
          onFocus={e=>e.target.style.borderColor=C.borderBright}
          onBlur={e=>e.target.style.borderColor=C.border}/>

        <div style={{ display:"flex", gap:6, flex:1 }}>
          {["all","work","life"].map(ctx=>{
            const active = contextF===ctx;
            return (
              <button key={ctx} onClick={()=>setContextF(ctx)}
                style={{ background: active ? C.bg3 : "transparent",
                  color: active ? C.text : C.textMuted,
                  border:`1px solid ${active?C.borderHi:C.border}`,
                  borderRadius:18, padding:"6px 14px", cursor:"pointer",
                  fontSize:11, fontWeight:800, fontFamily:"inherit",
                  boxShadow: active ? "0 2px 10px rgba(0,0,0,.3)" : "none",
                  transition:"all .15s" }}>
                {ctx==="all"?"All":ctx==="work"?"🔥 Work":"🏡 Personal"}
              </button>
            );
          })}
        </div>

        <Btn onClick={()=>setEditing(blank)} variant="primary" size="lg"><span style={{fontSize:20,lineHeight:1}}>＋</span><span style={{marginLeft:4}}>Add Person</span></Btn>
      </div>

      {/* Grid */}
      {filtered.length===0 ? (
        <div style={{ textAlign:"center", padding:"70px 20px" }}>
          <div style={{ fontSize:64, marginBottom:16, letterSpacing:8 }}>🔥⚡🙏</div>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700,
              fontSize:22, color:C.textSub, letterSpacing:.5, marginBottom:12 }}>
            {people.length===0 ? "No people added yet." : "No matches found."}
          </div>
          {people.length===0 && (
            <>
              <div style={{ fontSize:13, color:C.textMuted, maxWidth:380, margin:"0 auto 24px",
                  lineHeight:1.7 }}>
                Start building your people intelligence. Score anyone you work with or live around on Drive, Ability, and Humility — then get personalized coaching on how to lead and work with them.
              </div>
              <Btn onClick={()=>setEditing(blank)} variant="primary" size="lg"><span style={{fontSize:22,lineHeight:1}}>＋</span><span style={{marginLeft:5}}>Add Your First Person</span></Btn>
            </>
          )}
        </div>
      ) : (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(275px,1fr))", gap:14 }}>
          {filtered.map(p=>(
            <PersonCard key={p.id} person={p}
              onView={setViewing} onEdit={setEditing} onDelete={setDelPending}/>
          ))}
        </div>
      )}

      {editing    && <PersonModal person={editing} onSave={savePerson} onClose={()=>setEditing(null)}/>}
      {viewing    && <PersonDetail person={viewing} onClose={()=>setViewing(null)} onEdit={p=>{setViewing(null);setEditing(p);}}/>}
      {delPending && <Confirm msg={`Remove ${delPending.name} from your list? This can't be undone.`}
          yesLabel="Remove" yesVariant="danger"
          onYes={()=>deletePerson(delPending.id)} onNo={()=>setDelPending(null)}/>}
    </div>
  );
}

                    <div style={{ fontSize:13, color:C.textSub, lineHeight:1.7 }}>{combo.how}</div>
                  </div>
                  <div style={{ fontSize:11, color:C.textMuted, fontStyle:"italic" }}>
                    📖 {combo.bookRef} — Characters like {combo.character}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Danny's closing */}
      <div style={{ background:`linear-gradient(145deg,${C.bg2},${C.bg1})`,
          border:`1px solid ${C.borderHi}`, borderRadius:16, padding:"22px 24px",
          boxShadow:"0 4px 30px rgba(0,0,0,.5)" }}>
        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:20,
            color:C.gold, letterSpacing:1, marginBottom:14 }}>DANNY'S CLOSING WORD</div>
        <div style={{ fontSize:13, color:C.textSub, lineHeight:1.75, marginBottom:16 }}>
          "It doesn't matter where you are today. What matters is that you are a better version tomorrow than you were today. Always be growing. Always be learning. Don't stagnate. We need each other. You are a piece — you are not the whole."
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
          {[
            { q:"You are a piece, you are not the whole.", icon:"🧩" },
            { q:"Let who they are make you a better version of who you are.", icon:"🪞" },
          ].map((item,i)=>(
            <div key={i} style={{ background:C.goldBg, border:`1px solid ${C.goldBorder}`,
                borderLeft:`3px solid ${C.gold}`, borderRadius:9, padding:"11px 14px" }}>
              <div style={{ fontSize:20, marginBottom:6 }}>{item.icon}</div>
              <div style={{ fontSize:12, color:C.gold, fontStyle:"italic", lineHeight:1.6 }}>
                "{item.q}"
              </div>
            </div>
          ))}
        </div>
        <div style={{ background:C.bg0, border:`1px solid ${C.borderHi}`, borderRadius:12,
            padding:"18px 22px", textAlign:"center",
            boxShadow:"inset 0 2px 20px rgba(0,0,0,.4)" }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:32,
              color:C.gold, letterSpacing:4, textShadow:`0 0 30px ${C.gold}50` }}>
            BE COACHABLE.
          </div>
          <div style={{ fontSize:12, color:C.textMuted, marginTop:6 }}>
            The whole point. That's the whole it. — Danny Cancino
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,    setTab]    = useState("people");
  const [people, setPeople] = useState(()=>load("ic_people_v1",[]));

  function handlePeople(p) { setPeople(p); save("ic_people_v1",p); }

  const TABS = [
    { id:"people", label:"👥 My People",    count:people.length },
    { id:"ref",    label:"📖 The Framework", count:null },
  ];

  return (
    <div style={S.app}>
      <GlobalStyles/>

      {/* Header */}
      <div style={S.hdr}>
        {/* Brand */}
        <div style={{ flexShrink:0 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900,
              fontSize:20, letterSpacing:3, color:C.gold, lineHeight:1,
              textShadow:`0 0 24px ${C.gold}60` }}>
            IRREDUCIBLE
          </div>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:C.textMuted,
              letterSpacing:2.5, textTransform:"uppercase", marginTop:1 }}>
            Complexity · People Intelligence
          </div>
        </div>

        {/* Trait pills */}
        <div style={{ display:"flex", gap:6, flexShrink:0 }}>
          {Object.values(TRAITS).map(t=>(
            <div key={t.key} style={{ background:`linear-gradient(135deg,${t.bg},${C.bg0})`,
                border:`1px solid ${t.border}`, borderRadius:7,
                padding:"4px 11px", display:"flex", alignItems:"center", gap:5,
                boxShadow:`0 0 10px ${t.color}15` }}>
              <span style={{ fontSize:18 }}>{t.icon}</span>
              <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800,
                  fontSize:12, color:t.color, letterSpacing:.8 }}>{t.label}</span>
            </div>
          ))}
        </div>

        {/* Nav */}
        <nav style={{ display:"flex", gap:6, flex:1, marginLeft:10 }}>
          {TABS.map(t=>{
            const active = tab===t.id;
            return (
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{ background: active
                      ? "linear-gradient(135deg,#c47d0a,#9a5f08)"
                      : `linear-gradient(135deg,${C.bg2},${C.bg1})`,
                  color: active ? "#fff" : C.textSub,
                  border:`1px solid ${active?"#f0b429":C.border}`,
                  borderRadius:9, padding:"9px 20px", cursor:"pointer",
                  fontSize:13, fontWeight:800, letterSpacing:.3,
                  fontFamily:"inherit",
                  boxShadow: active
                    ? `0 4px 20px ${C.gold}50, 0 0 0 1px #f0b42960, inset 0 1px 0 rgba(255,255,255,.2)`
                    : `0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04)`,
                  transform: active ? "translateY(-1px)" : "translateY(0)",
                  transition:"all .18s cubic-bezier(.22,1,.36,1)",
                  display:"flex", alignItems:"center", gap:7 }}>
                <span style={{fontSize:18,lineHeight:1,marginRight:2}}>{t.label.split(' ')[0]}</span><span>{t.label.split(' ').slice(1).join(' ')}</span>
                {t.count!==null && (
                  <span style={{ background: active?"rgba(0,0,0,.25)":C.bg0,
                      color: active?"#fff":C.textMuted, borderRadius:10,
                      padding:"1px 8px", fontSize:11, fontWeight:800 }}>
                    {t.count}
                  </span>
                )}
              </button>
            );
          })}
        </nav>

        <div style={{ fontSize:12, color:C.textMuted, flexShrink:0,
            fontFamily:"'DM Mono',monospace", letterSpacing:.5 }}>
          Danny Cancino
        </div>
      </div>

      {/* Tab content */}
      <div style={{ display:tab==="people"?"block":"none" }}>
        <PeopleTab people={people} setPeople={handlePeople}/>
      </div>
      <div style={{ display:tab==="ref"?"block":"none" }}>
        <ReferenceTab/>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
